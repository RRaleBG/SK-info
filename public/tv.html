<!DOCTYPE html>
<html lang="sr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Srpski TV kanali</title>
    <link rel="icon" href="data:image/x-icon;base64,AA">
    <link rel="stylesheet" href="./style.css" media="all">

    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />


    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Video.js CSS -->
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />

</head>
<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
<style>

</style>
</head>

<body>
    <header>
        <div class="logo">
            SK <span>INFO</span>
        </div>
        <div class="subtitle">
            DISPEČERSKI CENTAR • UI 2026
        </div>
    </header>

    <div class="container">

        <div class="section">
            <div id="weathers" style="display: flex; justify-content: center;"></div>
        </div>



        <h1>Izaberi kanal</h1>
        <select id="channelSelect">
            <option value="">-- Odaberi kanal --</option>
            <option value="https://webtvstream.bhtelecom.ba/rts1.m3u8">RTS 1</option>
            <option value="https://webtvstream.bhtelecom.ba/rts2.m3u8">RTS 2</option>
            <option value="https://edge8.pink.rs/redtv/chunklist_w1213385221.m3u8">Red TV</option>
            <option value="https://static.am.mediaoutcast.com/storage/nQJnjJkO/nQJnjJkO/stream/O68x4o8g/720p/720p.m3u8">
                Kurir TV</option>
            <option value="https://edge-rs-03.maksnet.tv/informertv-secure/web/playlist.m3u8">Informer TV</option>
            <!-- RTV koristi RTMP, pa ga browser ne može direktno pustiti -->
        </select>
    </div>


    <!-- Video.js JS -->
    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <video id="tvPlayer" controls autoplay muted playsinline></video>

    <script>
        function playChannel(url) {
            const video = document.getElementById("tvPlayer");

            if (Hls.isSupported()) {
                const hls = new Hls({ lowLatencyMode: true, enableWorker: true });
                hls.loadSource(url);
                hls.attachMedia(video);
            } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                video.src = url;
            } else {
                alert("Vaš browser ne podržava HLS.");
            }
        }

        document.getElementById("channelSelect").addEventListener("change", function () {
            const url = this.value;
            if (url) playChannel(url);
        });

    </script>


</body>

</html>
